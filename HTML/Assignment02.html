<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form action="">
        <h2>Registration Form</h2>
        <label for="fname">First Name :</label>
        <input type="text" name="firstName" id="fname">
        <br><br>

        <label for="lname">Last Name :</label>
        <input type="text" name="lastName" id="lname">
        <br><br>

        <label for="gmail">Gmail :</label>
        <input type="email" name="email" id="gmail">
        <br><br>

        <label for="pwd">Password</label>
        <input type="password" name="password" id="pwd">
        <br><br>

        <label for="Gen">Gender :</label>
        <input type="radio" name="Gen" id="male">
        <label for="male">Male</label>
        <input type="radio" name="Gen" id="female">
        <label for="female">Female</label>
        <input type="radio" name="Gen" id="other">
        <label for="other">Other</label>
        <br><br>
        <label for="dob">Date of Birth :</label>
        <input type="date" name="DOB" id="dob">
        <br><br>

        <label for="city">City :</label>
        <select name="city" id="city">
            <option value="">select city</option>
            <option value="patna">Patna</option>
            <option value="Sitamarhi">Sitamarhi</option>
            <option value="Muzaffapur">Muzaffapur</option>
            <option value="Seohar">Seohar</option>
            <option value="Ara">Ara</option>
        </select>
        <br><br>

        <label for="course">Courses :</label>
        <input type="checkbox" name="sub" id="java" value="Java">
        <label for="java">Java</label>
        <input type="checkbox" name="sub" id="python" value="Python">
        <label for="python">Pyhon</label>
        <input type="checkbox" name="sub" id="php" value="PHP">
        <label for="php">PHP</label>
        <input type="checkbox" name="sub" id="sql" value="SQL">
        <label for="sql">SQL</label>
        <input type="checkbox" name="sub" id="html" value="HTML">
        <label for="html">HTML</label>
        <br><br>

        <label for="id">Upload Id proof :</label>
        <input type="file" name="ID" id="id">
        <br><br>

        <label for="comment">Comment :</label>
        <textarea name="Comments" id="comment" rows="2" cols="8"></textarea>
        <br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Reset">
        <br><br><br>

        <a href="table.html" target="_blank" >Click Here For Table View</a>

    </form>
</body>
</html>
