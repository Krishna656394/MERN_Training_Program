<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        header h1{
            font-size: 2rem;
            font-weight: 900;
            text-shadow: 2px 2px 2px rgb(132, 29, 192);
            font-style: italic;
        }
        h1{
                width: 40%;
                padding-block: 1rem;
                margin: 0 auto;
                text-align: center;
                border: 5px solid blue;
                background-color: #fff;
                color: rgb(132, 29, 192);
                border-radius: 10px;
                line-height: 3.5rem;
        }

        main section .top{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top .left-address {
            width: 18%;
            height: 320px;
            border: 5px solid red;
            padding: 10px;
            border-radius: 10px;
            background-color: white;
            box-shadow: 3px 3px 5px 5px purple;
        }
    </style>
</head>
<body>
    <header>
        <h1>
            Welcome to All In One General Store
        </h1>
    </header>
    <hr><hr>
    <main>
        <section>
            <div class="top">
                <div class="left-address">
                    <ul>
                        <li>Address A-139</li>
                        <li>Sitamarhi</li>
                        <li>Bihar</li>
                        <li>Delhi</li>
                        <li>Patna</li>
                        <li>Noida</li>
                    </ul>
                </div>
                <div class="right-address"></div>
            </div>
            <div class="bottom">
                <div class="left-instruction">
                    <h2>
                        WE SERVE OUR <br>
                        BEST TO YOU
                    </h2>
                    <br><br>
                    <h2>
                        PLEASE VISIT <br>
                        OUR <br>
                        STORE FOR <br>
                        BETTER DEAL <br>
                        AND PRICE.
                    </h2>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
